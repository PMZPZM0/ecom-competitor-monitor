name: Desktop packages

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run pack:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: 电商竞品监控-Windows
          path: release/*.exe
          if-no-files-found: error
          compression-level: 0

  macos:
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Require Apple signing and notarization credentials
        shell: bash
        run: |
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name}" ]]; then missing+=("$name"); fi
          done
          if (( ${#missing[@]} )); then
            echo "::error::Missing required macOS release secrets: ${missing[*]}"
            exit 1
          fi
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - name: Install sharp for target macOS architecture
        run: npm install --no-save --package-lock=false --include=optional --os=darwin --cpu=${{ matrix.arch }} sharp
      - name: Verify sharp target runtime
        run: |
          test -d node_modules/@img/sharp-darwin-${{ matrix.arch }}
          test -d node_modules/@img/sharp-libvips-darwin-${{ matrix.arch }}
      - name: Build signed and notarized macOS package
        run: npm run pack:mac -- --${{ matrix.arch }} --publish never
      - name: Verify Apple signature and notarization ticket
        shell: bash
        run: |
          app_path="$(find release -type d -name '电商竞品监控.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
      - uses: actions/upload-artifact@v4
        with:
          name: 电商竞品监控-macOS-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error
          compression-level: 0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 电商竞品监控-*
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --repo "$GITHUB_REPOSITORY" --title "电商竞品监控 $GITHUB_REF_NAME" --generate-notes --verify-tag
