name: Desktop packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run pack:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: 电商竞品监控-Windows
          path: release/*

  macos:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run pack:mac -- --${{ matrix.arch }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: 电商竞品监控-macOS-${{ matrix.arch }}
          path: release/*
